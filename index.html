<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>샤오린의 행운 로또</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="container">
        <header>
            <button class="theme-toggle" id="theme-toggle" aria-label="테마 변경">🌸</button>
            <h2 class="welcome-text">샤오린을 위한 최고의 행운</h2>
            <h1>샤오린의 <span>행운 로또</span></h1>
            <div class="stats-bar">
                <div class="stat-item">추첨 횟수: <span id="draw-count">0</span></div>
                <div class="stat-item">행운 지수: <span id="lucky-score">0</span>%</div>
            </div>
        </header>

        <div class="machine-container">
            <div class="machine-drum" id="machine-drum">
                <!-- 드럼 안의 장식용 공들 -->
                <div class="inner-ball" style="--delay: 0.1s; --top: 20%; --left: 30%;"></div>
                <div class="inner-ball" style="--delay: 0.5s; --top: 50%; --left: 60%;"></div>
                <div class="inner-ball" style="--delay: 0.3s; --top: 70%; --left: 20%;"></div>
                <div class="inner-ball" style="--delay: 0.8s; --top: 30%; --left: 70%;"></div>
                <div class="inner-ball" style="--delay: 0.2s; --top: 60%; --left: 40%;"></div>
            </div>
            <div class="machine-heart">💖</div>
            <div class="machine-exit"></div>
        </div>

        <div class="number-display" id="number-display">
            <div class="placeholder-text">샤오린의 행운을 클릭하세요!</div>
        </div>

        <div class="controls">
            <button class="generate-btn" id="generate-btn">
                <span class="btn-text">행운의 번호 추출하기</span>
                <span class="btn-icon">✨</span>
            </button>
        </div>

        <div class="history-section">
            <h3>최근의 기록</h3>
            <ul id="history-list">
                <li class="empty-msg">아직 행운의 기록이 없어요</li>
            </ul>
        </div>

        <div class="inquiry-section">
            <h3>메시지 보내기</h3>
            <form action="https://formspree.io/f/mqewyjdj" method="POST" id="inquiry-form">
                <div class="input-group">
                    <input type="text" name="name" placeholder="이름" required>
                    <input type="email" name="email" placeholder="이메일" required>
                </div>
                <textarea name="message" rows="3" placeholder="당신의 행운 이야기를 들려주세요..." required></textarea>
                <button type="submit" class="submit-btn">사랑을 담아 보내기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
